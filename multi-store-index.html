<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="點餐計算">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>多店點餐計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & Tokens ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:       #0f172a;
  --ink2:      #1e293b;
  --ink3:      #334155;
  --slate:     #64748b;
  --line:      #e2e8f0;
  --paper:     #f8fafc;
  --white:     #ffffff;
  --accent:    #f97316;
  --accent2:   #ea580c;
  --accent-bg: #fff7ed;
  --accent-line:#fed7aa;
  --green:     #22c55e;
  --red:       #ef4444;
  --radius:    14px;
  --shadow:    0 4px 24px rgba(15,23,42,.10);
  --shadow-sm: 0 2px 8px  rgba(15,23,42,.07);
  font-size: 16px;
}

html,body{height:100%;background:var(--paper);color:var(--ink);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  overscroll-behavior-y:contain;}

/* ── Views ── */
.view{display:none;flex-direction:column;height:100%}
.view.active{display:flex}

/* ══════════════════════════════════════════
   HOME VIEW
══════════════════════════════════════════ */
#home-view{background:var(--ink)}

.home-header{
  padding: env(safe-area-inset-top,20px) 24px 0;
  padding-top: calc(env(safe-area-inset-top,0px) + 32px);
}
.home-header h1{
  font-size:2rem;font-weight:900;letter-spacing:-1px;
  color:var(--white);line-height:1.1;
}
.home-header h1 span{color:var(--accent)}
.home-header p{font-size:.82rem;color:#94a3b8;margin-top:6px;font-weight:500}

.store-list{
  flex:1;overflow-y:auto;padding:24px 16px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px)+24px);
  display:flex;flex-direction:column;gap:12px;
  -webkit-overflow-scrolling:touch;
}

.store-card{
  background:var(--ink2);border:1px solid var(--ink3);
  border-radius:var(--radius);padding:18px 20px;
  display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:background .15s,border-color .15s,transform .12s;
  position:relative;overflow:hidden;
}
.store-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);border-radius:2px 0 0 2px;
  transform:scaleY(0);transition:transform .2s;transform-origin:center;
}
.store-card:active{background:#273449;border-color:var(--accent);transform:scale(.985)}
.store-card:active::before{transform:scaleY(1)}

.store-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--ink3);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.store-meta{flex:1;min-width:0}
.store-name{font-size:1.05rem;font-weight:700;color:var(--white)}
.store-type-badge{
  display:inline-block;margin-top:5px;
  font-size:.68rem;font-weight:700;letter-spacing:.5px;
  padding:2px 8px;border-radius:20px;text-transform:uppercase;
}
.badge-noodle_shop{background:#1e3a5f;color:#93c5fd}
.badge-breakfast   {background:#1a3320;color:#86efac}
.badge-snack       {background:#3b1f0a;color:#fdba74}

.store-cart-badge{
  background:var(--accent);color:var(--white);
  font-size:.72rem;font-weight:800;
  min-width:22px;height:22px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  padding:0 6px;
}
.store-cart-badge.hidden{display:none}

.store-chevron{color:#475569;font-size:.9rem;flex-shrink:0}

/* offline pill */
.offline-pill{
  display:none;position:fixed;top:calc(env(safe-area-inset-top,0px)+8px);right:12px;
  background:#ef4444;color:#fff;font-size:.68rem;font-weight:700;
  padding:4px 10px;border-radius:20px;z-index:999;letter-spacing:.3px;
}
body.offline .offline-pill{display:block}

/* ══════════════════════════════════════════
   STORE VIEW
══════════════════════════════════════════ */
#store-view{background:var(--paper)}

.store-topbar{
  background:var(--ink);color:var(--white);
  padding:0 16px;
  padding-top:env(safe-area-inset-top,0px);
  min-height:calc(56px + env(safe-area-inset-top,0px));
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  flex-shrink:0;
}
.btn-back{
  width:38px;height:38px;border-radius:50%;border:none;
  background:var(--ink3);color:var(--white);
  font-size:1.1rem;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.btn-back:active{background:#475569}
.topbar-title{flex:1;font-size:1rem;font-weight:800;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-total{
  font-size:.8rem;font-weight:700;
  background:var(--accent);padding:5px 10px;border-radius:20px;
  flex-shrink:0;white-space:nowrap;
}

/* Category tabs */
.cat-tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:1.5px solid var(--line);
  position:sticky;top:calc(56px + env(safe-area-inset-top,0px));
  z-index:99;scrollbar-width:none;flex-shrink:0;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:0 16px;height:44px;line-height:44px;
  font-size:.8rem;font-weight:700;color:var(--slate);
  border-bottom:2.5px solid transparent;cursor:pointer;
  white-space:nowrap;transition:color .15s,border-color .15s;
  user-select:none;
}
.cat-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Menu scroll area */
.menu-scroll{
  flex:1;overflow-y:auto;padding:12px 12px 0;
  -webkit-overflow-scrolling:touch;
}

/* Section */
.menu-section{display:none}
.menu-section.active{display:block}
.section-heading{
  font-size:.72rem;font-weight:900;text-transform:uppercase;
  letter-spacing:.8px;color:var(--slate);
  padding:4px 4px 10px;border-bottom:1px solid var(--line);
  margin-bottom:10px;
}

/* Item card */
.item-card{
  background:var(--white);border:1.5px solid var(--line);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;transition:border-color .18s,box-shadow .18s;
}
.item-card.in-cart{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(249,115,22,.15);
}
.item-main{
  display:flex;align-items:center;
  padding:13px 14px;gap:12px;
}
.item-info{flex:1;min-width:0}
.item-name{font-size:.95rem;font-weight:700;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:.8rem;font-weight:700;color:var(--accent);margin-top:3px}

/* Qty control */
.qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{
  width:38px;height:38px;border-radius:50%;border:2px solid var(--accent);
  background:var(--white);color:var(--accent);
  font-size:1.4rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  user-select:none;transition:background .1s,transform .1s;line-height:1;
  touch-action:manipulation;
}
.qty-btn.plus{background:var(--accent);color:var(--white)}
.qty-btn:active{transform:scale(.86)}
.qty-btn.plus:active{background:var(--accent2)}
.qty-num{min-width:26px;text-align:center;font-size:1rem;font-weight:800}

/* Options */
.item-options{padding:0 14px 13px;display:flex;flex-wrap:wrap;gap:7px}
.opt-label{font-size:.68rem;font-weight:700;color:var(--slate);
  width:100%;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.opt-btn{
  padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--line);background:var(--white);
  font-size:.76rem;font-weight:600;cursor:pointer;
  color:var(--ink3);transition:all .14s;user-select:none;
}
.opt-btn.selected{
  border-color:var(--accent);background:var(--accent-bg);color:var(--accent2)
}
.opt-btn:active{transform:scale(.92)}

/* ── Bottom bar ── */
.bottom-bar{
  background:var(--white);
  border-top:1.5px solid var(--line);
  padding:10px 14px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px);
  box-shadow:0 -4px 20px rgba(0,0,0,.07);
  flex-shrink:0;
}
.bar-summary{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.bar-count{font-size:.78rem;color:var(--slate);font-weight:600}
.bar-total{font-size:1.6rem;font-weight:900;color:var(--accent);line-height:1}
.bar-total span{font-size:.8rem;color:var(--slate);font-weight:600;margin-right:2px}
.bar-btns{display:flex;gap:10px}
.btn-clear{
  flex:1;padding:13px;border-radius:12px;
  border:1.5px solid var(--line);background:var(--white);
  font-size:.88rem;font-weight:700;color:var(--slate);cursor:pointer;
  transition:background .14s;
}
.btn-clear:active{background:var(--paper)}
.btn-order{
  flex:2.2;padding:13px;border-radius:12px;border:none;
  background:var(--accent);color:var(--white);
  font-size:.92rem;font-weight:800;cursor:pointer;
  transition:background .14s;
}
.btn-order:active{background:var(--accent2)}
.btn-order.empty{opacity:.45;pointer-events:none}

/* ── Order modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:500;
  align-items:flex-end;backdrop-filter:blur(3px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--white);width:100%;
  max-height:80vh;border-radius:22px 22px 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom,0px)+20px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.modal-grip{width:38px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 18px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h2{font-size:1rem;font-weight:800}
.modal-close{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--line);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--slate);
}
.order-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--line);font-size:.86rem;
}
.order-name{flex:1;font-weight:500}
.order-qty{color:var(--slate);font-size:.8rem;white-space:nowrap}
.order-sub{font-weight:800;color:var(--accent);white-space:nowrap}
.modal-total-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:16px;padding-top:14px;border-top:2px solid var(--ink);
  font-size:1rem;font-weight:800;
}
.modal-total-amt{font-size:1.4rem;color:var(--accent)}
.empty-hint{
  text-align:center;color:var(--slate);
  padding:40px 0 16px;font-size:.9rem;
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+150px);
  left:50%;transform:translateX(-50%) translateY(14px);
  background:var(--ink);color:var(--white);
  padding:9px 18px;border-radius:30px;font-size:.78rem;font-weight:700;
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;z-index:600;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PWA install banner ── */
.install-bar{
  display:none;background:var(--accent-bg);
  border-bottom:1.5px solid var(--accent-line);
  padding:10px 16px;align-items:center;gap:10px;flex-shrink:0;
}
.install-bar.show{display:flex}
.install-text{flex:1;font-size:.78rem;font-weight:600;color:var(--ink)}
.install-text small{display:block;font-weight:400;color:var(--slate);font-size:.68rem;margin-top:1px}
.btn-pwa-install{
  padding:7px 13px;border-radius:10px;border:none;
  background:var(--accent);color:var(--white);
  font-size:.76rem;font-weight:800;cursor:pointer;white-space:nowrap;
}
.btn-pwa-dismiss{
  width:28px;height:28px;border-radius:50%;border:none;
  background:transparent;font-size:1rem;color:var(--slate);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>

<!-- Offline pill -->
<div class="offline-pill">📵 離線</div>

<!-- PWA install banner -->
<div class="install-bar" id="install-bar">
  <div class="install-text">加入主畫面，離線也能點餐
    <small>像 App 一樣使用</small>
  </div>
  <button class="btn-pwa-install" id="btn-pwa-install">安裝</button>
  <button class="btn-pwa-dismiss" id="btn-pwa-dismiss">✕</button>
</div>

<!-- ═══════ HOME VIEW ═══════ -->
<div class="view active" id="home-view">
  <div class="home-header">
    <h1>選擇<span>店家</span></h1>
    <p>點擊店家開始點餐計算</p>
  </div>
  <div class="store-list" id="store-list">
    <div style="color:#64748b;text-align:center;padding:40px 0;font-size:.9rem">載入中…</div>
  </div>
</div>

<!-- ═══════ STORE VIEW ═══════ -->
<div class="view" id="store-view">
  <div class="store-topbar">
    <button class="btn-back" id="btn-back">←</button>
    <div class="topbar-title" id="topbar-title">店家菜單</div>
    <div class="topbar-total" id="topbar-total">$0</div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="menu-scroll" id="menu-scroll"></div>
  <div class="bottom-bar">
    <div class="bar-summary">
      <div class="bar-count" id="bar-count">尚未選擇品項</div>
      <div class="bar-total"><span>合計</span>$<span id="bar-total-num">0</span></div>
    </div>
    <div class="bar-btns">
      <button class="btn-clear" id="btn-clear">🗑 清空</button>
      <button class="btn-order empty" id="btn-order" onclick="showModal()">查看訂單</button>
    </div>
  </div>
</div>

<!-- Order modal -->
<div class="modal-overlay" id="modal" onclick="onModalBg(event)">
  <div class="modal">
    <div class="modal-grip"></div>
    <div class="modal-head">
      <h2 id="modal-title">訂單明細</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-foot"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';
// ─────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────
const STORES_URL = 'data/stores.json';
const TYPE_EMOJI = { noodle_shop:'🍜', breakfast:'🍳', snack:'🍢' };
const TYPE_LABEL = { noodle_shop:'麵食', breakfast:'早餐', snack:'小吃' };

// ─────────────────────────────────────────
//  State
// ─────────────────────────────────────────
let stores   = [];          // stores list
let current  = null;        // { storeId, storeData }
let cart     = {};          // key → { qty, optIdx }   (per store, loaded from LS)

// ─────────────────────────────────────────
//  localStorage helpers
// ─────────────────────────────────────────
const cartKey = id => `cart_${id}`;

function loadCart(storeId) {
  try { cart = JSON.parse(localStorage.getItem(cartKey(storeId)) || '{}'); }
  catch { cart = {}; }
}
function saveCart(storeId) {
  try { localStorage.setItem(cartKey(storeId), JSON.stringify(cart)); }
  catch {}
}
function clearCart(storeId) {
  cart = {};
  saveCart(storeId);
}

// ─────────────────────────────────────────
//  Item key & price helpers
// ─────────────────────────────────────────
function itemKey(catName, item) { return `${catName}||${item.id}`; }

function getEntry(key) {
  if (!cart[key]) cart[key] = { qty: 0, optIdx: -1 };
  return cart[key];
}

function effectivePrice(item, entry) {
  if (item.options && item.options.length && entry.optIdx >= 0)
    return item.options[entry.optIdx].price;
  return item.price;
}

// ─────────────────────────────────────────
//  Views
// ─────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─────────────────────────────────────────
//  HOME — render store list
// ─────────────────────────────────────────
function renderHome() {
  const list = document.getElementById('store-list');
  list.innerHTML = '';
  stores.forEach(s => {
    const card = document.createElement('div');
    card.className = 'store-card';
    card.dataset.id = s.id;

    // Cart badge count
    let cartTotal = 0;
    try {
      const c = JSON.parse(localStorage.getItem(cartKey(s.id)) || '{}');
      Object.values(c).forEach(e => cartTotal += (e.qty || 0));
    } catch {}

    const emoji = TYPE_EMOJI[s.type] || '🏪';
    const label = TYPE_LABEL[s.type] || s.type;
    const badgeClass = `badge-${s.type}`;

    card.innerHTML = `
      <div class="store-icon">${emoji}</div>
      <div class="store-meta">
        <div class="store-name">${s.name}</div>
        <span class="store-type-badge ${badgeClass}">${label}</span>
      </div>
      <div class="store-cart-badge ${cartTotal === 0 ? 'hidden' : ''}">${cartTotal}</div>
      <div class="store-chevron">›</div>`;

    card.addEventListener('click', () => openStore(s));
    list.appendChild(card);
  });
}

// ─────────────────────────────────────────
//  STORE — open
// ─────────────────────────────────────────
async function openStore(storeMeta) {
  // Save previous cart
  if (current) saveCart(current.storeId);

  // Load store data
  let data;
  try {
    const res = await fetch(storeMeta.file);
    data = await res.json();
  } catch(e) {
    toast('⚠️ 菜單載入失敗');
    return;
  }

  current = { storeId: storeMeta.id, storeData: data };
  loadCart(storeMeta.id);

  // Render
  document.getElementById('topbar-title').textContent = storeMeta.name;
  renderTabs(data.categories);
  renderMenu(data.categories, 0);
  updateBottom();
  showView('store-view');
  document.getElementById('menu-scroll').scrollTop = 0;
}

// ─────────────────────────────────────────
//  STORE — tabs
// ─────────────────────────────────────────
function renderTabs(cats) {
  const el = document.getElementById('cat-tabs');
  el.innerHTML = '';
  cats.forEach((cat, i) => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat.category;
    tab.onclick = () => switchTab(i);
    el.appendChild(tab);
  });
}
function switchTab(idx) {
  document.querySelectorAll('.cat-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.menu-section').forEach((s,i) => s.classList.toggle('active', i===idx));
  document.getElementById('menu-scroll').scrollTop = 0;
}

// ─────────────────────────────────────────
//  STORE — menu sections
// ─────────────────────────────────────────
function renderMenu(cats, activeIdx) {
  const scroll = document.getElementById('menu-scroll');
  scroll.innerHTML = '';
  cats.forEach((cat, ci) => {
    const sec = document.createElement('div');
    sec.className = 'menu-section' + (ci === activeIdx ? ' active' : '');
    sec.id = `sec-${ci}`;
    sec.innerHTML = `<div class="section-heading">${cat.category}</div>`;
    cat.items.forEach(item => sec.appendChild(buildCard(cat.category, item)));
    scroll.appendChild(sec);
  });
}

// ─────────────────────────────────────────
//  Item card builder
// ─────────────────────────────────────────
function buildCard(catName, item) {
  const key   = itemKey(catName, item);
  const entry = getEntry(key);
  const effP  = effectivePrice(item, entry);
  const hasOpt = item.options && item.options.length > 0;
  const priceLabel = hasOpt && entry.optIdx < 0 ? `$${item.price} 起` : `$${effP}`;

  const card = document.createElement('div');
  card.className = 'item-card' + (entry.qty > 0 ? ' in-cart' : '');
  card.id = `card-${key}`;

  card.innerHTML = `
    <div class="item-main">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">${priceLabel}</div>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn minus" data-key="${key}" data-delta="-1">−</button>
        <span class="qty-num">${entry.qty}</span>
        <button class="qty-btn plus"  data-key="${key}" data-delta="1">＋</button>
      </div>
    </div>`;

  if (hasOpt) {
    const optDiv = document.createElement('div');
    optDiv.className = 'item-options';
    optDiv.innerHTML = `<span class="opt-label">規格</span>`;
    item.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (entry.optIdx === idx ? ' selected' : '');
      btn.textContent = `${opt.name}　$${opt.price}`;
      btn.onclick = () => selectOpt(catName, item, idx);
      optDiv.appendChild(btn);
    });
    card.appendChild(optDiv);
  }

  // bind qty buttons
  card.querySelectorAll('.qty-btn').forEach(btn => {
    const delta = parseInt(btn.dataset.delta);
    bindQtyBtn(btn, catName, item, delta);
  });

  return card;
}

function refreshCard(catName, item) {
  const key = itemKey(catName, item);
  const old = document.getElementById(`card-${key}`);
  if (old) old.replaceWith(buildCard(catName, item));
}

// ─────────────────────────────────────────
//  Long-press qty button
// ─────────────────────────────────────────
function bindQtyBtn(btn, catName, item, delta) {
  let timer, interval;
  const fire = () => {
    changeQty(catName, item, delta);
  };
  const start = () => {
    fire();
    timer = setTimeout(() => {
      interval = setInterval(fire, 100);
    }, 500);
  };
  const stop = () => { clearTimeout(timer); clearInterval(interval); };

  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup',   stop);
  btn.addEventListener('pointerleave',stop);
  btn.addEventListener('contextmenu', e => e.preventDefault());
}

// ─────────────────────────────────────────
//  Qty & Option actions
// ─────────────────────────────────────────
function changeQty(catName, item, delta) {
  const key   = itemKey(catName, item);
  const entry = getEntry(key);
  entry.qty = Math.max(0, entry.qty + delta);
  saveCart(current.storeId);
  refreshCard(catName, item);
  updateBottom();
}

function selectOpt(catName, item, idx) {
  const key   = itemKey(catName, item);
  const entry = getEntry(key);
  entry.optIdx = entry.optIdx === idx ? -1 : idx;
  saveCart(current.storeId);
  refreshCard(catName, item);
  updateBottom();
}

// ─────────────────────────────────────────
//  Bottom bar
// ─────────────────────────────────────────
function updateBottom() {
  if (!current) return;
  let total = 0, count = 0, kinds = 0;
  const cats = current.storeData.categories;
  cats.forEach(cat => {
    cat.items.forEach(item => {
      const entry = getEntry(itemKey(cat.category, item));
      if (entry.qty > 0) {
        total += effectivePrice(item, entry) * entry.qty;
        count += entry.qty;
        kinds++;
      }
    });
  });
  document.getElementById('bar-total-num').textContent = total;
  document.getElementById('topbar-total').textContent  = `$${total}`;
  document.getElementById('bar-count').textContent =
    count > 0 ? `共 ${kinds} 種・${count} 樣` : '尚未選擇品項';
  const btn = document.getElementById('btn-order');
  btn.classList.toggle('empty', count === 0);
}

// ─────────────────────────────────────────
//  Back button
// ─────────────────────────────────────────
document.getElementById('btn-back').onclick = () => {
  if (current) saveCart(current.storeId);
  current = null;
  renderHome();
  showView('home-view');
};

// ─────────────────────────────────────────
//  Clear button
// ─────────────────────────────────────────
document.getElementById('btn-clear').onclick = () => {
  const cats = current?.storeData.categories;
  if (!cats) return;
  const hasAny = cats.some(c => c.items.some(i => getEntry(itemKey(c.category, i)).qty > 0));
  if (!hasAny) { toast('目前沒有任何品項'); return; }
  if (!confirm('確定清空此店訂單？')) return;
  clearCart(current.storeId);
  renderMenu(cats, activeCatIdx());
  updateBottom();
  toast('已清空訂單');
};

function activeCatIdx() {
  const tabs = document.querySelectorAll('.cat-tab');
  for (let i = 0; i < tabs.length; i++) if (tabs[i].classList.contains('active')) return i;
  return 0;
}

// ─────────────────────────────────────────
//  Order modal
// ─────────────────────────────────────────
function showModal() {
  const cats = current?.storeData.categories;
  if (!cats) return;
  let html = '', total = 0, hasAny = false;

  cats.forEach(cat => {
    cat.items.forEach(item => {
      const entry = getEntry(itemKey(cat.category, item));
      if (entry.qty > 0) {
        hasAny = true;
        const price = effectivePrice(item, entry);
        const sub   = price * entry.qty;
        total += sub;
        const opt = entry.optIdx >= 0 && item.options ? `（${item.options[entry.optIdx].name}）` : '';
        html += `<div class="order-row">
          <span class="order-name">${item.name}${opt}</span>
          <span class="order-qty">×${entry.qty}</span>
          <span class="order-sub">$${sub}</span>
        </div>`;
      }
    });
  });

  document.getElementById('modal-title').textContent = `${current.storeData.store_info.name} 訂單`;
  document.getElementById('modal-body').innerHTML = hasAny
    ? html
    : '<div class="empty-hint">🛒 尚未選擇任何品項</div>';
  document.getElementById('modal-foot').innerHTML = hasAny
    ? `<div class="modal-total-row"><span>總計</span><span class="modal-total-amt">$${total}</span></div>`
    : '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function onModalBg(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// ─────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────
//  Offline detection
// ─────────────────────────────────────────
function syncOnline() { document.body.classList.toggle('offline', !navigator.onLine); }
window.addEventListener('online',  syncOnline);
window.addEventListener('offline', () => { syncOnline(); toast('📵 已切換為離線模式'); });
syncOnline();

// ─────────────────────────────────────────
//  PWA install prompt
// ─────────────────────────────────────────
let _deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _deferredPrompt = e;
  if (!localStorage.getItem('pwa_ok')) {
    document.getElementById('install-bar').classList.add('show');
  }
});
document.getElementById('btn-pwa-install').onclick = async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('install-bar').classList.remove('show');
  if (outcome === 'accepted') toast('✅ 已加入主畫面');
};
document.getElementById('btn-pwa-dismiss').onclick = () => {
  document.getElementById('install-bar').classList.remove('show');
  localStorage.setItem('pwa_ok', '1');
};

// ─────────────────────────────────────────
//  Service Worker
// ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(r => console.log('[SW] registered', r.scope))
      .catch(e => console.warn('[SW] failed', e));
  });
}

// ─────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────
(async () => {
  try {
    const res = await fetch(STORES_URL);
    stores = await res.json();
  } catch {
    document.getElementById('store-list').innerHTML =
      '<div style="color:#ef4444;text-align:center;padding:40px 0">⚠️ 無法載入店家清單</div>';
    return;
  }
  renderHome();
})();
</script>
</body>
</html>
