<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="點餐">
<meta name="theme-color" content="#0f0e17">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>多店菜單計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0e17;--surface:#1a1830;--surface2:#232140;--border:#2e2b50;
  --text:#fffffe;--muted:#a7a3c2;
  --accent:#6366f1;--accent2:#818cf8;
  --r:16px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── Screens ── */
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.screen.active{display:flex}

/* ══════════════ HOME ══════════════ */
.home-header{
  padding:calc(16px + env(safe-area-inset-top,0px)) 20px 20px;
  background:linear-gradient(160deg,var(--surface) 0%,var(--bg) 100%);
  flex-shrink:0;
}
.home-header h1{
  font-size:1.6rem;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.home-header p{font-size:.78rem;color:var(--muted);margin-top:4px}

.store-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;-webkit-overflow-scrolling:touch}
.store-list::-webkit-scrollbar{display:none}

.store-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;cursor:pointer;
  transition:transform .13s,border-color .18s;
}
.store-card::before{content:'';position:absolute;inset:0;background:var(--c-grad,none);pointer-events:none}
.store-card:active{transform:scale(.97)}
.store-card.has-cart{border-color:var(--c-accent,var(--accent))}

.s-icon{width:50px;height:50px;border-radius:13px;background:var(--c-bg,#6366f120);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.s-meta{flex:1;min-width:0}
.s-name{font-size:1rem;font-weight:700}
.s-type{font-size:.73rem;color:var(--muted);margin-top:2px}
.s-badge{display:none;background:var(--c-accent,var(--accent));color:#fff;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.store-card.has-cart .s-badge{display:block}
.s-arrow{color:var(--muted);font-size:1.1rem;flex-shrink:0}

/* ══════════════ MENU ══════════════ */
.menu-topbar{
  display:flex;align-items:center;gap:11px;
  padding:calc(13px + env(safe-area-inset-top,0px)) 14px 13px;
  background:var(--surface);border-bottom:1.5px solid var(--border);
  flex-shrink:0;z-index:50;
}
.btn-back{width:40px;height:40px;border-radius:12px;background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.m-title{flex:1;min-width:0}
.m-sname{font-size:.98rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-stype{font-size:.7rem;color:var(--muted)}

.cat-tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1.5px solid var(--border);scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:11px 17px;font-size:.8rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;transition:color .16s,border-color .16s;white-space:nowrap}
.cat-tab.active{color:var(--sa,var(--accent));border-bottom-color:var(--sa,var(--accent))}

.menu-body{flex:1;overflow-y:auto;padding:12px 12px 0;-webkit-overflow-scrolling:touch}
.menu-body::-webkit-scrollbar{display:none}

.cat-sec{display:none;padding-bottom:4px}
.cat-sec.active{display:block}
.cat-head{font-size:.7rem;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:4px 2px 10px;border-bottom:1px solid var(--border);margin-bottom:10px}

.ic{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ic.in-cart{border-color:var(--sa,var(--accent));box-shadow:0 0 0 3px color-mix(in srgb,var(--sa,var(--accent)) 20%,transparent)}
.ic-main{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;gap:12px}
.ic-info{flex:1;min-width:0}
.ic-name{font-size:.93rem;font-weight:600;line-height:1.3}
.ic-price{font-size:.8rem;font-weight:700;color:var(--sa,var(--accent));margin-top:4px}
.qc{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qb{width:38px;height:38px;border-radius:50%;border:2px solid var(--sa,var(--accent));color:var(--sa,var(--accent));background:transparent;font-size:1.3rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .11s;user-select:none}
.qb:active{transform:scale(.85)}
.qb.plus{background:var(--sa,var(--accent));color:#fff}
.qb.plus:active{filter:brightness(.82)}
.qn{min-width:22px;text-align:center;font-size:1rem;font-weight:800}

.ic-opts{padding:0 14px 13px;display:flex;flex-wrap:wrap;gap:7px}
.opt-lbl{font-size:.68rem;font-weight:700;color:var(--muted);width:100%;margin-bottom:2px;letter-spacing:.5px;text-transform:uppercase}
.ob{padding:6px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:.77rem;font-weight:600;color:var(--text);transition:all .14s;user-select:none}
.ob.sel{border-color:var(--sa,var(--accent));background:color-mix(in srgb,var(--sa,var(--accent)) 18%,var(--surface2));color:var(--sa,var(--accent))}
.ob:active{transform:scale(.92)}

/* ── Bottom Bar ── */
.bbar{background:var(--surface);border-top:1.5px solid var(--border);padding:11px 16px calc(11px + var(--safe-b));flex-shrink:0;box-shadow:0 -8px 30px #00000055}
.bbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bbar-lbl{font-size:.76rem;color:var(--muted)}
.bbar-total{font-size:1.5rem;font-weight:900;color:var(--sa,var(--accent));line-height:1}
.bbar-btns{display:flex;gap:10px}
.btn-clr{flex:1;padding:13px;border-radius:13px;background:var(--surface2);color:var(--muted);font-size:.86rem;font-weight:700;border:1.5px solid var(--border);transition:background .14s}
.btn-clr:active{background:var(--border)}
.btn-ord{flex:2.2;padding:13px;border-radius:13px;background:var(--sa,var(--accent));color:#fff;font-size:.9rem;font-weight:800;letter-spacing:.3px;transition:filter .14s}
.btn-ord:active{filter:brightness(.83)}
.btn-ord.empty{opacity:.42}

/* ── Modal ── */
.modal-wrap{display:none;position:fixed;inset:0;z-index:500;background:#00000075;backdrop-filter:blur(3px);align-items:flex-end}
.modal-wrap.open{display:flex}
.modal{background:var(--surface);width:100%;max-height:80dvh;border-radius:22px 22px 0 0;padding:0 20px calc(20px + var(--safe-b));overflow-y:auto;-webkit-overflow-scrolling:touch}
.m-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:14px auto 16px}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.m-head h2{font-size:1rem;font-weight:800}
.m-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.o-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.86rem}
.o-name{flex:1;font-weight:500}
.o-qty{color:var(--muted);font-size:.78rem;white-space:nowrap}
.o-price{font-weight:800;color:var(--sa,var(--accent));white-space:nowrap}
.m-total{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:13px;border-top:2px solid var(--text);font-size:1rem;font-weight:800}
.m-total-val{font-size:1.35rem;color:var(--sa,var(--accent))}
.m-empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.88rem}

/* ── Toast ── */
.toast{position:fixed;bottom:180px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:9px 18px;border-radius:30px;font-size:.78rem;font-weight:600;opacity:0;transition:opacity .24s,transform .24s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <h1>🏪 多店菜單</h1>
    <p>選擇店家，開始點餐計算</p>
  </div>
  <div class="store-list" id="store-list">
    <div style="text-align:center;color:var(--muted);padding:60px 0;font-size:.9rem">載入中…</div>
  </div>
</div>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="menu-topbar">
    <button class="btn-back" id="btn-back">‹</button>
    <div class="m-title">
      <div class="m-sname" id="m-sname"></div>
      <div class="m-stype" id="m-stype"></div>
    </div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="menu-body" id="menu-body"></div>
  <div class="bbar">
    <div class="bbar-row">
      <div class="bbar-lbl" id="bbar-lbl">尚未選擇品項</div>
      <div class="bbar-total">$<span id="bbar-total">0</span></div>
    </div>
    <div class="bbar-btns">
      <button class="btn-clr" id="btn-clr">🗑 清空</button>
      <button class="btn-ord empty" id="btn-ord">查看訂單</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-wrap" id="modal" onclick="onMO(event)">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-head"><h2>📋 訂單明細</h2><button class="m-close" onclick="closeModal()">✕</button></div>
    <div id="m-body"></div>
    <div id="m-foot"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────
const TYPE_LABELS = {noodle_shop:'麵食館', breakfast:'早餐店', snack:'小吃店'};
const TYPE_ACCENT = {noodle_shop:'#f59e0b', breakfast:'#f97316', snack:'#10b981'};
const TYPE_BG     = {noodle_shop:'#f59e0b20', breakfast:'#f9731620', snack:'#10b98120'};
const TYPE_GRAD   = {
  noodle_shop:'linear-gradient(135deg,#f59e0b14,transparent 60%)',
  breakfast:  'linear-gradient(135deg,#f9731614,transparent 60%)',
  snack:      'linear-gradient(135deg,#10b98114,transparent 60%)'
};

// ── State ───────────────────────────────────
let stores = [], currentStore = null, menuData = [], cart = {};

function cKey(id){ return `cart_${id}`; }
function loadCart(id){ try{ return JSON.parse(localStorage.getItem(cKey(id))||'{}'); }catch{ return {}; } }
function saveCart(id,c){ try{ localStorage.setItem(cKey(id), JSON.stringify(c)); }catch{} }
function ikey(item){ return item.id||item.name; }

function getIS(item){
  const k=ikey(item);
  if(!cart[k]) cart[k]={qty:0,optionIdx:-1};
  return cart[k];
}
function effPrice(item){
  const s=getIS(item);
  return (item.options?.length>0 && s.optionIdx>=0) ? item.options[s.optionIdx].price : item.price;
}

// ── Home ─────────────────────────────────────
async function loadHome(){
  try{
    const r = await fetch('./data/stores.json');
    stores = await r.json();
  }catch{
    document.getElementById('store-list').innerHTML='<div style="text-align:center;color:#f43f5e;padding:60px 20px">無法載入店家清單</div>';
    return;
  }
  renderHome();
}

function renderHome(){
  const el=document.getElementById('store-list');
  el.innerHTML='';
  stores.forEach(s=>{
    const sc=loadCart(s.id);
    const total=Object.values(sc).reduce((sum,v)=>sum+(v.cachedPrice||0)*v.qty,0);
    const hasCart=Object.values(sc).some(v=>v.qty>0);
    const accent=TYPE_ACCENT[s.type]||'#6366f1';

    const div=document.createElement('div');
    div.className='store-card'+(hasCart?' has-cart':'');
    div.style.cssText=`--c-accent:${accent};--c-bg:${TYPE_BG[s.type]||'#6366f120'};--c-grad:${TYPE_GRAD[s.type]||'none'}`;
    div.innerHTML=`
      <div class="s-icon">${s.emoji||'🏪'}</div>
      <div class="s-meta">
        <div class="s-name">${s.name}</div>
        <div class="s-type">${TYPE_LABELS[s.type]||s.type}</div>
      </div>
      ${hasCart?`<div class="s-badge">$${total}</div>`:''}
      <div class="s-arrow">›</div>`;
    div.onclick=()=>openStore(s);
    el.appendChild(div);
  });
}

// ── Open Store ───────────────────────────────
async function openStore(info){
  currentStore=info;
  cart=loadCart(info.id);

  let data;
  try{
    const r=await fetch('./'+info.file);
    data=await r.json();
  }catch{
    showToast('⚠️ 無法載入菜單'); return;
  }
  menuData=data.categories||[];

  const accent=TYPE_ACCENT[info.type]||'#6366f1';
  document.getElementById('menu').style.setProperty('--sa',accent);
  document.getElementById('m-sname').textContent=info.name;
  document.getElementById('m-stype').textContent=TYPE_LABELS[info.type]||info.type;

  buildMenu();
  updateBar();
  showScreen('menu');
}

// ── Build Menu ───────────────────────────────
function buildMenu(){
  const tabs=document.getElementById('cat-tabs');
  const body=document.getElementById('menu-body');
  tabs.innerHTML=''; body.innerHTML='';

  menuData.forEach((cat,ci)=>{
    const tab=document.createElement('div');
    tab.className='cat-tab'+(ci===0?' active':'');
    tab.textContent=cat.category;
    tab.onclick=()=>switchCat(ci);
    tabs.appendChild(tab);

    const sec=document.createElement('div');
    sec.className='cat-sec'+(ci===0?' active':'');
    sec.id=`cs${ci}`;
    sec.innerHTML=`<div class="cat-head">${cat.category}</div>`;
    cat.items.forEach(it=>sec.appendChild(mkCard(it)));
    body.appendChild(sec);
  });
}

function mkCard(item){
  const s=getIS(item), ep=effPrice(item);
  const pl=item.options?.length>0 && s.optionIdx<0 ? `$${item.price} 起` : `$${ep}`;
  const k=ikey(item);

  const card=document.createElement('div');
  card.className='ic'+(s.qty>0?' in-cart':'');
  card.id=`ic-${k}`;

  card.innerHTML=`
    <div class="ic-main">
      <div class="ic-info">
        <div class="ic-name">${item.name}</div>
        <div class="ic-price">${pl}</div>
      </div>
      <div class="qc">
        <button class="qb minus" onclick="chQty('${k}',-1)">−</button>
        <span class="qn">${s.qty}</span>
        <button class="qb plus" onclick="chQty('${k}',1)">+</button>
      </div>
    </div>`;

  if(item.options?.length>0){
    const od=document.createElement('div');
    od.className='ic-opts';
    od.innerHTML='<span class="opt-lbl">規格</span>';
    item.options.forEach((opt,idx)=>{
      const b=document.createElement('button');
      b.className='ob'+(s.optionIdx===idx?' sel':'');
      b.textContent=`${opt.name}　$${opt.price}`;
      b.onclick=()=>selOpt(k,idx);
      od.appendChild(b);
    });
    card.appendChild(od);
  }
  return card;
}

function refreshCard(item){
  const el=document.getElementById(`ic-${ikey(item)}`);
  if(el) el.replaceWith(mkCard(item));
}
function findItem(k){ for(const c of menuData) for(const it of c.items) if(ikey(it)===k) return it; }

// ── Actions ──────────────────────────────────
function chQty(k,d){
  const item=findItem(k); if(!item) return;
  const s=getIS(item);
  s.qty=Math.max(0,s.qty+d);
  s.cachedPrice=effPrice(item);
  saveCart(currentStore.id,cart);
  refreshCard(item); updateBar();
}
function selOpt(k,idx){
  const item=findItem(k); if(!item) return;
  const s=getIS(item);
  s.optionIdx=s.optionIdx===idx?-1:idx;
  s.cachedPrice=effPrice(item);
  saveCart(currentStore.id,cart);
  refreshCard(item); updateBar();
}
function switchCat(i){
  document.querySelectorAll('.cat-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.cat-sec').forEach((s,j)=>s.classList.toggle('active',i===j));
}

// ── Bar ──────────────────────────────────────
function updateBar(){
  let total=0,count=0,kinds=0;
  for(const c of menuData) for(const it of c.items){
    const s=getIS(it);
    if(s.qty>0){total+=effPrice(it)*s.qty;count+=s.qty;kinds++;}
  }
  document.getElementById('bbar-total').textContent=total;
  document.getElementById('bbar-lbl').textContent=count>0?`${kinds} 種・${count} 樣品項`:'尚未選擇品項';
  document.getElementById('btn-ord').classList.toggle('empty',count===0);
}

// ── Clear ────────────────────────────────────
document.getElementById('btn-clr').onclick=()=>{
  if(!Object.values(cart).some(v=>v.qty>0)){showToast('購物車是空的');return;}
  if(!confirm('確定清空本店購物車？'))return;
  cart={}; saveCart(currentStore.id,cart);
  buildMenu(); updateBar(); showToast('已清空');
};

// ── Modal ────────────────────────────────────
document.getElementById('btn-ord').onclick=showModal;
function showModal(){
  const rows=[];
  for(const c of menuData) for(const it of c.items){const s=getIS(it);if(s.qty>0)rows.push({it,s});}
  const mb=document.getElementById('m-body'), mf=document.getElementById('m-foot');
  if(!rows.length){mb.innerHTML='<div class="m-empty">🛒 尚未選擇任何品項</div>';mf.innerHTML='';return;}
  let html='',total=0;
  rows.forEach(({it,s})=>{
    const p=effPrice(it),sub=p*s.qty; total+=sub;
    const opt=s.optionIdx>=0?`（${it.options[s.optionIdx].name}）`:'';
    html+=`<div class="o-row"><span class="o-name">${it.name}${opt}</span><span class="o-qty">×${s.qty}</span><span class="o-price">$${sub}</span></div>`;
  });
  mb.innerHTML=html;
  mf.innerHTML=`<div class="m-total"><span>總計</span><span class="m-total-val">$${total}</span></div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function onMO(e){if(e.target===document.getElementById('modal'))closeModal();}

// ── Back ─────────────────────────────────────
document.getElementById('btn-back').onclick=()=>{showScreen('home');renderHome();};

// ── Screen ───────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));}

// ── Toast ────────────────────────────────────
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Service Worker ───────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js')
      .then(r=>console.log('[SW]',r.scope)).catch(e=>console.warn('[SW]',e));
  });
}

// ── Boot ─────────────────────────────────────
loadHome();
</script>
</body>
</html>
